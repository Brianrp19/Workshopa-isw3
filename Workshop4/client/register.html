<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Workshop 4</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .register-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background-color: #218838;
        }

        #result {
            margin-top: 15px;
            padding: 10px;
            background: #eee;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9rem;
            word-wrap: break-word;
            display: none;
        }

        .login-link {
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .login-link a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="register-container">
        <h1>Registrarse</h1>
        <form id="registerForm">
            <label for="name">Nombre</label>
            <input type="text" id="name" required>

            <label for="lastName">Apellidos</label>
            <input type="text" id="lastName" required>

            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" required>

            <button type="submit">Crear Cuenta</button>
        </form>

        <div id="result"></div>
        <div class="login-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </div>
    </div>

    <script>
        // Si ya hay sesión, mandarlo de una vez a los cursos
        if (localStorage.getItem("token")) {
            window.location.href = "list-courses.html";
        }

        const API_BASE = "http://localhost:3001";
        const resultDiv = document.getElementById("result");

        function showStatus(message, isError = false) {
            resultDiv.textContent = message;
            resultDiv.style.display = "block";
            resultDiv.style.backgroundColor = isError ? "#f8d7da" : "#d1e7dd";
            resultDiv.style.color = isError ? "#721c24" : "#0f5132";
        }

        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("name").value.trim();
            const lastName = document.getElementById("lastName").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            showStatus("Registrando...");

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, lastName, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus("¡Registro exitoso! Redirigiendo al login...");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    showStatus("Error: " + data.message, true);
                }
            } catch (error) {
                showStatus("Error: No se pudo conectar al servidor", true);
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Cursos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
        }

        h2 {
            color: #333;
        }

        .nav {
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .nav a {
            margin-right: 15px;
            color: blue;
            text-decoration: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            text-align: left;
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #eee;
        }

        .btn {
            padding: 5px 10px;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-edit {
            background-color: #ffc107;
            border: 1px solid #d39e00;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: 1px solid #bd2130;
        }

        /* Estilos del Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            width: 400px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="nav">
            <a href="/">Cursos</a>
            <a href="/teachers">Profesores</a>
            <button onclick="logout()"
                style="float: right; background: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-left: 10px;">Cerrar
                Sesión</button>
            <a href="/home" class="btn btn-primary" style="float: right;">+ Nuevo Curso</a>
        </div>

        <h2>Cursos Disponibles</h2>

        <div class="card">
            <div id="result">Cargando cursos...</div>
        </div>
    </div>

    <!-- Modal para editar -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Editar Curso</h3>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label>Código</label>
                <input type="text" id="editCode">
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea id="editDescription"></textarea>
            </div>
            <div class="form-group">
                <label>Profesor</label>
                <select id="editTeacherId"></select>
            </div>
            <button class="btn btn-primary" onclick="updateCourse()">Actualizar</button>
            <button class="btn" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <script>
        // Si no hay token, al login
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }

        window.onload = function () {
            listCourses();
            loadTeachers();
        };

        // Obtiene la lista de cursos desde el servidor y genera la tabla HTML
        function handleError(res) {
            if (res.status === 401) {
                localStorage.removeItem("token");
                window.location.href = "login.html";
            }
            return res.json();
        }

        function listCourses() {
            fetch("http://localhost:3001/course", {
                headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
            })
                .then(res => handleError(res))
                .then(data => {
                    if (!data.length) {
                        document.getElementById("result").innerHTML = "No hay cursos registrados.";
                        return;
                    }
                    let html = '<table>';
                    html += '<tr><th>Código</th><th>Nombre</th><th>Descripción</th><th>Profesor</th><th>Acciones</th></tr>';
                    data.forEach(c => {
                        const teacherName = c.teacherId ? `${c.teacherId.nombre} ${c.teacherId.apellidos}` : 'N/A';
                        html += `<tr>
                            <td>${c.code}</td>
                            <td>${c.name}</td>
                            <td>${c.description}</td>
                            <td>${teacherName}</td>
                            <td>
                                <button class="btn btn-primary" onclick="openEditModal('${c._id}', '${c.name}', '${c.code}', '${c.description}', '${c.teacherId?._id}')">Editar</button>
                                <button class="btn btn-danger" onclick="deleteCourse('${c._id}')">Eliminar</button>
                            </td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById("result").innerHTML = html;
                });
        }

        let teachers = [];
        // Carga los profesores para que estén disponibles al editar un curso
        function loadTeachers() {
            fetch("http://localhost:3001/teacher", {
                headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
            })
                .then(res => handleError(res))
                .then(data => {
                    teachers = data;
                    const select = document.getElementById("editTeacherId");
                    select.innerHTML = data.map(t => `<option value="${t._id}">${t.nombre} ${t.apellidos}</option>`).join('');
                });
        }

        // Prepara y muestra el modal de edición con los datos del curso seleccionado
        function openEditModal(id, name, code, description, teacherId) {
            document.getElementById("editId").value = id;
            document.getElementById("editName").value = name;
            document.getElementById("editCode").value = code;
            document.getElementById("editDescription").value = description;
            document.getElementById("editTeacherId").value = teacherId;
            document.getElementById("editModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("editModal").style.display = "none";
        }

        // Envía la solicitud PUT al servidor para actualizar el curso
        function updateCourse() {
            const id = document.getElementById("editId").value;
            const body = {
                name: document.getElementById("editName").value,
                code: document.getElementById("editCode").value,
                description: document.getElementById("editDescription").value,
                teacherId: document.getElementById("editTeacherId").value
            };

            fetch(`http://localhost:3001/course/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + localStorage.getItem("token")
                },
                body: JSON.stringify(body)
            })
                .then(() => {
                    closeModal();
                    listCourses();
                });
        }

        // Elimina un curso tras la confirmación del usuario
        function deleteCourse(id) {
            if (confirm("¿Seguro?")) {
                fetch(`http://localhost:3001/course/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
                })
                    .then(res => handleError(res))
                    .then(() => listCourses());
            }
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/login";
        }
    </script>
</body>

</html>

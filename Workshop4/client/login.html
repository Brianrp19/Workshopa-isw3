<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Workshop 4</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 15px;
            padding: 10px;
            background: #eee;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9rem;
            word-wrap: break-word;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>Iniciar Sesión</h1>
        <form id="loginForm">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="********" required>

            <button type="submit">Entrar</button>
        </form>

        <div id="result"></div>
        <div style="text-align: center; margin-top: 10px; font-size: 0.9rem;">
            ¿No tienes cuenta? <a href="register.html" style="color: #007bff; text-decoration: none;">Regístrate
                aquí</a>
        </div>
    </div>

    <script>
        // Si ya hay un token, mandarlo directo a los cursos (Auto-login)
        if (localStorage.getItem("token")) {
            window.location.href = "list-courses.html";
        }

        const API_BASE = "http://localhost:3001";

        const resultDiv = document.getElementById("result");

        function showStatus(message, isError = false) {
            resultDiv.textContent = message;
            resultDiv.style.display = "block";
            resultDiv.style.backgroundColor = isError ? "#f8d7da" : "#eee";
            resultDiv.style.color = isError ? "#721c24" : "#333";
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            showStatus("Intentando iniciar sesión...");

            try {
                const response = await fetch(`${API_BASE}/auth/token`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    showStatus("¡Éxito! Redirigiendo...");
                    // Guardar el token en el localStorage (Persistente)
                    localStorage.setItem("token", data.token);

                    // Esperar un segundo para que el usuario vea el éxito
                    setTimeout(() => {
                        window.location.href = "list-courses.html";
                    }, 1000);
                } else {
                    showStatus("Error: " + (data.message || "Credenciales incorrectas"), true);
                }
            } catch (error) {
                showStatus("Error: No se pudo conectar al servidor", true);
                console.error("Error en login:", error);
            }
        });
    </script>
</body>

</html>

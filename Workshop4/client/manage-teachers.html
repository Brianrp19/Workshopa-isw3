<!-- 
    Página para la gestión integral de profesores (CRUD).
    Permite registrar, listar, editar y eliminar profesores de la base de datos.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Profesores</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        h2 {
            color: #333;
        }

        .form-container {
            background: white;
            padding: 15px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
        }

        button:hover {
            background-color: #0056b3;
        }

        .btn-delete {
            background-color: #dc3545;
        }

        .btn-delete:hover {
            background-color: #a71d2a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            text-align: left;
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #f2f2f2;
        }

        .nav {
            margin-bottom: 20px;
        }

        .nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="nav">
            <a href="/">Cursos</a>
            <a href="/teachers">Profesores</a>
            <button onclick="logout()"
                style="float: right; background: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">Cerrar
                Sesión</button>
        </div>

        <h2>Gestión de Profesores</h2>

        <div class="card">
            <h3 id="formTitle">Agregar Profesor</h3>
            <input type="hidden" id="teacherId">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre">
            </div>
            <div class="form-group">
                <label>Apellidos</label>
                <input type="text" id="apellidos">
            </div>
            <div class="form-group">
                <label>Cédula</label>
                <input type="text" id="cedula">
            </div>
            <div class="form-group">
                <label>Edad</label>
                <input type="number" id="edad">
            </div>
            <button onclick="saveTeacher()" id="saveBtn">Guardar</button>
            <button onclick="resetForm()" style="background:#6b7280; display:none;" id="cancelBtn">Cancelar</button>
        </div>

        <div class="card">
            <h3>Lista de Profesores</h3>
            <div id="teacherList">Cargando...</div>
        </div>
    </div>

    <script>
        // Si no hay token, al login
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }

        const API_URL = "http://localhost:3001/teacher";

        window.onload = loadTeachers;

        function handleError(res) {
            if (res.status === 401) {
                localStorage.removeItem("token");
                window.location.href = "login.html";
            }
            return res.json();
        }

        // Obtiene y muestra la lista de todos los profesores registrados
        function loadTeachers() {
            fetch(API_URL, {
                headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
            })
                .then(res => handleError(res))
                .then(data => {
                    let html = '<table>';
                    html += '<tr><th>Nombre</th><th>Apellidos</th><th>Cédula</th><th>Edad</th><th>Acciones</th></tr>';
                    data.forEach(t => {
                        html += `<tr>
                            <td>${t.nombre}</td>
                            <td>${t.apellidos}</td>
                            <td>${t.cedula}</td>
                            <td>${t.edad}</td>
                            <td>
                                <button onclick="editTeacher('${t._id}', '${t.nombre}', '${t.apellidos}', '${t.cedula}', ${t.edad})">Editar</button>
                                <button class="btn-delete" onclick="deleteTeacher('${t._id}')">Eliminar</button>
                            </td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById("teacherList").innerHTML = data.length ? html : "No hay profesores registrados.";
                });
        }

        // Guarda o actualiza un profesor dependiendo si tiene un ID asignado
        function saveTeacher() {
            const id = document.getElementById("teacherId").value;
            const body = {
                nombre: document.getElementById("nombre").value,
                apellidos: document.getElementById("apellidos").value,
                cedula: document.getElementById("cedula").value,
                edad: Number(document.getElementById("edad").value)
            };

            const method = id ? "PUT" : "POST";
            const url = id ? `${API_URL}/${id}` : API_URL;

            fetch(url, {
                method: method,
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + localStorage.getItem("token")
                },
                body: JSON.stringify(body)
            })
                .then(res => handleError(res))
                .then(() => {
                    resetForm();
                    loadTeachers();
                })
                .catch(err => alert("Error: " + err.message));
        }

        // Carga los datos de un profesor en el formulario para su edición
        function editTeacher(id, nombre, apellidos, cedula, edad) {
            document.getElementById("teacherId").value = id;
            document.getElementById("nombre").value = nombre;
            document.getElementById("apellidos").value = apellidos;
            document.getElementById("cedula").value = cedula;
            document.getElementById("edad").value = edad;
            document.getElementById("formTitle").innerText = "Editar Profesor";
            document.getElementById("cancelBtn").style.display = "inline-block";
        }

        // Elimina un profesor tras la confirmación
        function deleteTeacher(id) {
            if (confirm("¿Seguro?")) {
                fetch(`${API_URL}/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
                })
                    .then(res => handleError(res))
                    .then(() => loadTeachers());
            }
        }

        // Limpia el formulario y lo restaura a su estado original de "Agregar"
        function resetForm() {
            document.getElementById("teacherId").value = "";
            document.getElementById("nombre").value = "";
            document.getElementById("apellidos").value = "";
            document.getElementById("cedula").value = "";
            document.getElementById("edad").value = "";
            document.getElementById("formTitle").innerText = "Agregar Profesor";
            document.getElementById("cancelBtn").style.display = "none";
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/login";
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Cursos</title>
    <script>
        // Se ejecuta al cargar la página para mostrar los cursos inmediatamente
        window.onload = function () {
            listCourses();
        };

        // Función para obtener todos los cursos desde la API y mostrarlos en una tabla
        function listCourses() {
            fetch("http://localhost:3001/course")
                .then(res => res.json())
                .then(data => {
                    let html = '<table border="1">';
                    html += '<tr><th>ID</th><th>Nombre</th><th>Créditos</th><th>Acciones</th></tr>';

                    data.forEach(course => {
                        html += `<tr>
                            <td>${course._id}</td>
                            <td>${course.name}</td>
                            <td>${course.credits}</td>
                            <td>
                                <button onclick="editCourse('${course._id}', '${course.name}', ${course.credits})">Editar</button>
                                <button onclick="deleteCourse('${course._id}')">Eliminar</button>
                            </td>
                        </tr>`;
                    });

                    html += '</table>';
                    document.getElementById("result").innerHTML = html;
                })
                .catch(err => console.log(err));
        }

        // Carga los datos de un curso en el formulario de edición
        function editCourse(id, name, credits) {
            document.getElementById("editId").value = id;
            document.getElementById("editName").value = name;
            document.getElementById("editCredits").value = credits;
            document.getElementById("editForm").style.display = "block";
        }

        // Envía una petición PUT a la API para actualizar un curso
        function updateCourse() {
            const id = document.getElementById("editId").value;
            const name = document.getElementById("editName").value;
            const credits = Number(document.getElementById("editCredits").value);

            fetch(`http://localhost:3001/course/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, credits })
            })
                .then(res => res.json())
                .then(data => {
                    document.getElementById("editForm").style.display = "none";
                    listCourses(); // Recarga la lista después de actualizar
                })
                .catch(err => console.log(err));
        }

        // Envía una petición DELETE a la API para eliminar un curso
        function deleteCourse(id) {
            if (confirm("¿Estás seguro de eliminar este curso?")) {
                fetch(`http://localhost:3001/course/${id}`, {
                    method: "DELETE"
                })
                    .then(res => res.json())
                    .then(data => {
                        listCourses(); // Recarga la lista después de eliminar
                    })
                    .catch(err => console.log(err));
            }
        }
    </script>
</head>

<body>
    <h2>Lista de Cursos</h2>
    <button onclick="listCourses()">Recargar</button>
    <a href="/home">Crear Nuevo Curso</a>
    <br><br>

    <!-- Formulario oculto para editar cursos -->
    <div id="editForm" style="display:none;">
        <h3>Editar Curso</h3>
        <input type="hidden" id="editId" />
        Nombre: <input type="text" id="editName" /><br>
        Créditos: <input type="number" id="editCredits" /><br>
        <button onclick="updateCourse()">Actualizar</button>
        <button onclick="document.getElementById('editForm').style.display='none'">Cancelar</button>
        <br><br>
    </div>

    <!-- Div donde se renderiza la tabla de cursos -->
    <div id="result"></div>
</body>

</html>

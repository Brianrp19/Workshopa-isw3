<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Curso</title>
    <script>
        // Función para enviar una petición POST a la API y crear un nuevo curso
        function createCourse() {
            const name = document.getElementById("name").value;
            const credits = Number(document.getElementById("credits").value);

            fetch("http://localhost:3001/course", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, credits })
            })
                .then(res => res.json())
                .then(data => {
                    // Muestra el resultado de la creación y limpia los campos
                    document.getElementById("result").innerHTML = "Curso creado: " + JSON.stringify(data);
                    document.getElementById("name").value = "";
                    document.getElementById("credits").value = "";
                })
                .catch(err => console.log(err));
        }
    </script>
</head>

<body>
    <h2>Crear Nuevo Curso</h2>

    Nombre: <input id="name" type="text" /><br><br>
    Créditos: <input id="credits" type="number" /><br><br>

    <button onclick="createCourse()">Crear</button>
    <a href="/">Ver Lista de Cursos</a>

    <h3>Resultado:</h3>
    <div id="result"></div>
</body>

</html>
